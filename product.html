<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كشف أسعار لمعرض أبو رامز</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      padding: 20px;
    }
    h1 { text-align: center; }
    .search-box { margin-bottom: 20px; text-align: center; }
    input[type="text"] { padding: 8px; font-size: 16px; margin: 5px; }
    button { padding: 8px 12px; font-size: 16px; cursor: pointer; margin: 5px; }
    mark { background-color: yellow; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px; text-align: right; }
    th { background-color: #f2f2f2; }
    .hidden { display: none; }
    #resultCount {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>

  <h1>كشف أسعار لمعرض أبو رامز</h1>

 <!-- زر الانتقال للرابط الخارجي -->
<button 
  onclick="window.location.href='https://ramezatatra9.github.io/ramez/invoice.html'"
  style="
    background-color: #5dade2;  /* أزرق فاتح */
    color: white; 
    border: none; 
    padding: 10px 20px; 
    font-size: 16px; 
    border-radius: 6px; 
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
  "
  onmouseover="this.style.backgroundColor='#3498db'"
  onmouseout="this.style.backgroundColor='#5dade2'"
>
  انتقل لإنشاء الفاتورة
</button>

  <div class="search-box">
   <p> <input type="text" id="searchInput" placeholder="   اكبس هون وسوي بحث 🔍 ">
   </p> <button id="searchBtn">بحث</button>
   <button id="clearBtn">مسح ✖️</button>
  <p>  <div style="
  background-color: #1D70B8; /* اللون الأصفر */
  color: white;               /* لون النص أسود */
  padding: 5px 15px;         /* مساحة صغيرة حول النص */
  border-radius: 5px;        /* انحناء الزوايا */
  display: inline-block;     /* يجعل المستطيل يضبط حجمه حسب النص */
  font-family: Arial, sans-serif;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.2); /* ظل خفيف */
">
  <h4 style="margin: 0;">تصميم وتنفيذ المبرمج رامز 💯</h4>
</div></p>
  </div>

  <div id="resultCount"></div>

  <div id="content">
    <table id="priceTable">
      <thead>
        <tr><th>رقم الصنف</th><th>الصنف</th><th>السعر</th></tr>
      </thead>
      <tbody>
      
  
    <tr>
        <td>I00000001</td>
        <td>غسالة ال جي 10.5 كيلو سلفر LG V3</td>
        <td>2520</td>
    </tr>





        
    </tr>
  </tbody>
    </table>
  </div>

  <script>
    // 🔹 إزالة أي تظليل
    function clearHighlights() {
      document.querySelectorAll('#priceTable td').forEach(td => {
        td.innerHTML = td.textContent;
      });
    }

    // 🔹 بحث ذكي مرن
    function smartSearch() {
      const input = document.getElementById('searchInput').value.trim().toLowerCase();
      const rows = Array.from(document.querySelectorAll('#priceTable tbody tr'));
      let matches = 0;

      clearHighlights();

      if (input === '') {
        rows.forEach(row => row.classList.remove('hidden'));
        document.getElementById('resultCount').textContent = '';
        return;
      }

      const words = input.split(/\s+/);

      rows.forEach(row => {
        const rowText = Array.from(row.querySelectorAll('td'))
                             .map(td => td.textContent.toLowerCase())
                             .join(' ');
        const isMatch = words.every(word => rowText.includes(word));

        if (isMatch) {
          row.classList.remove('hidden');
          // تظليل كل كلمة في أي خلية
          row.querySelectorAll('td').forEach(td => {
            words.forEach(word => {
              const regex = new RegExp(`(${word})`, 'gi');
              td.innerHTML = td.innerHTML.replace(regex, '<mark>$1</mark>');
            });
          });
          matches++;
        } else {
          row.classList.add('hidden');
        }
      });

      document.getElementById('resultCount').textContent = matches > 0
        ? `عدد النتائج: ${matches}`
        : 'لا توجد نتائج مطابقة 😕';
    }

    // 🔹 تفعيل البحث أثناء الكتابة والزر
    document.getElementById('searchInput').addEventListener('input', smartSearch);
    document.getElementById('searchBtn').addEventListener('click', smartSearch);

    // 🔹 زر مسح البحث
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      smartSearch();
    });
  </script>

</body>
</html>
