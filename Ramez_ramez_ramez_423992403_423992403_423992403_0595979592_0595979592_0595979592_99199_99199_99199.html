<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف أسعار لمعرض أبو رامز</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    padding:20px;
}

h1{
    text-align:center;
}

.search-box{
    margin-bottom:20px;
    text-align:center;
}

input[type="text"]{
    padding:8px;
    font-size:16px;
    margin:5px;
    width:300px;
}

button{
    padding:8px 12px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
}

mark{
    background-color:yellow;
}

table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
}

th,td{
    border:1px solid #333;
    padding:8px;
    text-align:right;
}

th{
    background-color:#f2f2f2;
}

.hidden{
    display:none;
}

#resultCount{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
    color:#444;
}
</style>
</head>

<body>

<div style="background-color:#00003B;color:white;text-align:center;padding:15px 0;margin-bottom:20px;">
    <h1>كشف اسعار منتجات معرض ابو رامز</h1>
</div>

<button onclick="window.location.href='https://ramezatatra9.github.io/ramez/invoice.html'">
    انتقل لإنشاء الفاتورة
</button>

<div class="search-box">

    <p>
        <input
            type="text"
            id="searchInput"
            placeholder="اكبس هون وسوي بحث 🔍">
    </p>

    <button id="searchBtn">بحث</button>
    <button id="clearBtn">مسح ✖️</button>

    <p>
        <div style="
            background-color:#1D70B8;
            color:white;
            padding:5px 15px;
            border-radius:5px;
            display:inline-block;
            font-family:Arial,sans-serif;
            box-shadow:1px 1px 4px rgba(0,0,0,0.2);
        ">
            <h4 style="margin:0;">
                تصميم وتنفيذ المبرمج رامز 💯
            </h4>
        </div>
    </p>

</div>

<div id="resultCount"></div>

<div id="content">

<table id="priceTable">

    <thead>
        <tr>
            <th>رقم الصنف</th>
            <th>الصنف</th>
            <th>السعر</th>
        </tr>
    </thead>

    <tbody>

        <tr>
            <td>I00000001</td>
            <td>غسالة ال جي 10.5 كيلو سلفر LG V3</td>
            <td>2500</td>
        </tr>

        <tr>
            <td>I00000002</td>
            <td>ثلاجة سامسونج 18 قدم</td>
            <td>1800</td>
        </tr>

        <tr>
            <td>I00000003</td>
            <td>شاشة LG سمارت 55 بوصة</td>
            <td>1450</td>
        </tr>

    </tbody>

</table>

</div>

<script>

function clearHighlights() {
    document.querySelectorAll('#priceTable td').forEach(td => {
        td.innerHTML = td.textContent;
    });
}

function smartSearch() {

    const input = document
        .getElementById('searchInput')
        .value
        .trim()
        .toLowerCase();

    const rows = document.querySelectorAll('#priceTable tbody tr');

    let matches = 0;

    clearHighlights();

    if(input === ''){

        rows.forEach(row=>{
            row.classList.remove('hidden');
        });

        document.getElementById('resultCount').textContent = '';
        return;
    }

    const words = input.split(/\s+/);

    rows.forEach(row=>{

        const rowText = Array.from(row.cells)
            .map(cell => cell.textContent.toLowerCase())
            .join(' ');

        const found = words.every(word =>
            rowText.includes(word)
        );

        if(found){

            row.classList.remove('hidden');

            row.querySelectorAll('td').forEach(td=>{

                let html = td.textContent;

                words.forEach(word=>{

                    if(word.length > 0){

                        const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

                        const regex = new RegExp(
                            `(${escapedWord})`,
                            'gi'
                        );

                        html = html.replace(
                            regex,
                            '<mark>$1</mark>'
                        );
                    }
                });

                td.innerHTML = html;
            });

            matches++;

        }else{
            row.classList.add('hidden');
        }

    });

    document.getElementById('resultCount').textContent =
        matches > 0
        ? `عدد النتائج: ${matches}`
        : 'لا توجد نتائج مطابقة 😕';
}

document
    .getElementById('searchInput')
    .addEventListener('input', smartSearch);

document
    .getElementById('searchBtn')
    .addEventListener('click', smartSearch);

document
    .getElementById('clearBtn')
    .addEventListener('click', () => {

        document.getElementById('searchInput').value = '';

        smartSearch();

    });

</script>

</body>
</html>
