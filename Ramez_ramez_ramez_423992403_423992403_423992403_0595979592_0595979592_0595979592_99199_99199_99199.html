<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف أسعار معرض أبو رامز</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Tahoma,sans-serif}
body{background:#f4f6f9;color:#222;padding:20px}
.header{background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;text-align:center;padding:25px;border-radius:15px;margin-bottom:20px}
.search-box{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px;text-align:center}
#searchInput{width:80%;padding:12px;border:1px solid #ccc;border-radius:10px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:12px;border-bottom:1px solid #eee}
thead th{background:#0d47a1;color:white;position:sticky;top:0}
tbody tr:hover{background:#e3f2fd}
</style>
</head>
<body>
<div class="header">
<h1>كشف أسعار معرض أبو رامز</h1>
<p>نسخة تجريبية محسنة</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

<table id="priceTable">
<thead>
<tr>
<th>رقم الصنف</th>
<th>اسم الصنف</th>
<th>السعر (₪)</th>
</tr>
</thead>
<tbody>
<tr><td>I00002001</td><td>ثلاجة سامسونج 4 أبواب زجاج أسود</td><td>3450</td></tr>
<tr><td>I00002002</td><td>غسالة ال جي 9 كيلو انفيرتر</td><td>2250</td></tr>
<tr><td>I00002003</td><td>شاشة سمارت 55 بوصة 4K</td><td>1450</td></tr>
</tbody>
</table>
</body>
</html>
